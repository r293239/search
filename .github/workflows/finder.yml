name: Web URL Finder

on:
  schedule:
    - cron: '30 * * * *'    # Runs 30 minutes after the crawler
  workflow_dispatch:

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r crawler/requirements.txt
      - name: Find new URLs
        run: python crawler/finder.py
