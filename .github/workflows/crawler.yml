name: Auto Crawl & Index

on:
  schedule:
    - cron: '0 * * * *'    # Every hour
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r crawler/requirements.txt
      - name: Discover new pages
        run: python crawler/discover.py
      - name: Crawl and index
        run: python crawler/crawler.py
